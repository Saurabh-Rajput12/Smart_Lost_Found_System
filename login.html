<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Smart Lost & Found</title>
  <link rel="stylesheet" href="../assets/css/auth.css"/>
</head>
<body>

  <div class="auth-wrapper">

    <!-- Left Panel: Branding -->
    <div class="auth-brand">
      <div class="brand-content">
        <div class="brand-icon">🔍</div>
        <h1>Smart Lost<br/>&amp; Found</h1>
        <p>Helping reunite people with their belongings using smart matching technology.</p>
        <ul class="brand-features">
          <li>✅ Report lost or found items</li>
          <li>✅ Smart item matching</li>
          <li>✅ Real-time notifications</li>
          <li>✅ Easy claim process</li>
        </ul>
      </div>
    </div>

    <!-- Right Panel: Login Form -->
    <div class="auth-form-panel">
      <div class="auth-card">

        <div class="auth-header">
          <h2>Welcome Back</h2>
          <p>Sign in to your account</p>
        </div>

        <!-- Alert Box (shown when error/success in URL) -->
        <div id="alertBox" class="alert" style="display:none"></div>

        <form id="loginForm" action="/LostAndFoundSystem/login" method="POST">

          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
              <span class="input-icon">📧</span>
              <input type="email"
                     id="email"
                     name="email"
                     placeholder="Enter your email"
                     required
                     autocomplete="email"/>
            </div>
            <span class="field-error" id="emailError"></span>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input type="password"
                     id="password"
                     name="password"
                     placeholder="Enter your password"
                     required
                     autocomplete="current-password"/>
              <button type="button"
                      class="toggle-password"
                      onclick="togglePassword('password')">👁</button>
            </div>
            <span class="field-error" id="passwordError"></span>
          </div>

          <button type="submit" class="btn-primary" id="loginBtn">
            Sign In
          </button>

        </form>

        <div class="auth-footer">
          <p>Don't have an account?
            <a href="register.html">Create one here</a>
          </p>
        </div>

      </div>
    </div>

  </div>

  <script src="../assets/js/auth.js"></script>
  <script>
    // Show messages passed via URL parameters
    const params = new URLSearchParams(window.location.search);

    if (params.get('error')) {
      showAlert(params.get('error'), 'error');
    }
    if (params.get('success')) {
      showAlert(params.get('success'), 'success');
    }

    // Client-side form validation before submit
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      let valid = true;

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      clearErrors();

      if (!email) {
        showFieldError('emailError', 'Email is required');
        valid = false;
      } else if (!isValidEmail(email)) {
        showFieldError('emailError', 'Enter a valid email address');
        valid = false;
      }

      if (!password) {
        showFieldError('passwordError', 'Password is required');
        valid = false;
      }

      if (!valid) {
        e.preventDefault();
        return;
      }

      // Show loading state on button
      const btn = document.getElementById('loginBtn');
      btn.textContent = 'Signing in...';
      btn.disabled = true;
    });
  </script>

</body>
</html>
