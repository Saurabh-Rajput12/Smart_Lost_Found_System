<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Smart Lost & Found</title>
  <link rel="stylesheet" href="../assets/css/auth.css"/>
</head>
<body>

  <div class="auth-wrapper">

    <!-- Left Panel: Branding -->
    <div class="auth-brand">
      <div class="brand-content">
        <div class="brand-icon">🔍</div>
        <h1>Join Us Today</h1>
        <p>Create a free account and start reporting or claiming lost and found items.</p>
        <ul class="brand-features">
          <li>✅ Free to register</li>
          <li>✅ Instant notifications</li>
          <li>✅ Track your reports</li>
          <li>✅ Secure & private</li>
        </ul>
      </div>
    </div>

    <!-- Right Panel: Register Form -->
    <div class="auth-form-panel">
      <div class="auth-card">

        <div class="auth-header">
          <h2>Create Account</h2>
          <p>Fill in your details to get started</p>
        </div>

        <!-- Alert Box -->
        <div id="alertBox" class="alert" style="display:none"></div>

        <form id="registerForm" action="/LostAndFoundSystem/register" method="POST">

          <div class="form-group">
            <label for="name">Full Name</label>
            <div class="input-wrapper">
              <span class="input-icon">👤</span>
              <input type="text"
                     id="name"
                     name="name"
                     placeholder="Enter your full name"
                     required/>
            </div>
            <span class="field-error" id="nameError"></span>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
              <span class="input-icon">📧</span>
              <input type="email"
                     id="email"
                     name="email"
                     placeholder="Enter your email"
                     required/>
            </div>
            <span class="field-error" id="emailError"></span>
          </div>

          <div class="form-group">
            <label for="phone">Phone Number
              <span class="optional">(optional)</span>
            </label>
            <div class="input-wrapper">
              <span class="input-icon">📱</span>
              <input type="tel"
                     id="phone"
                     name="phone"
                     placeholder="Enter your phone number"/>
            </div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input type="password"
                     id="password"
                     name="password"
                     placeholder="Minimum 6 characters"
                     required/>
              <button type="button"
                      class="toggle-password"
                      onclick="togglePassword('password')">👁</button>
            </div>
            <span class="field-error" id="passwordError"></span>
            <!-- Password strength bar -->
            <div class="strength-bar">
              <div id="strengthFill" class="strength-fill"></div>
            </div>
            <span id="strengthText" class="strength-text"></span>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input type="password"
                     id="confirmPassword"
                     name="confirmPassword"
                     placeholder="Re-enter your password"
                     required/>
              <button type="button"
                      class="toggle-password"
                      onclick="togglePassword('confirmPassword')">👁</button>
            </div>
            <span class="field-error" id="confirmError"></span>
          </div>

          <button type="submit" class="btn-primary" id="registerBtn">
            Create Account
          </button>

        </form>

        <div class="auth-footer">
          <p>Already have an account?
            <a href="login.html">Sign in here</a>
          </p>
        </div>

      </div>
    </div>

  </div>

  <script src="../assets/js/auth.js"></script>
  <script>
    // Show URL messages
    const params = new URLSearchParams(window.location.search);
    if (params.get('error'))   showAlert(params.get('error'),   'error');
    if (params.get('success')) showAlert(params.get('success'), 'success');

    // Password strength meter
    document.getElementById('password').addEventListener('input', function() {
      updateStrength(this.value);
    });

    // Register form validation
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      let valid = true;
      clearErrors();

      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirmPassword').value;

      if (!name || name.length < 2) {
        showFieldError('nameError', 'Please enter your full name');
        valid = false;
      }

      if (!email || !isValidEmail(email)) {
        showFieldError('emailError', 'Enter a valid email address');
        valid = false;
      }

      if (!password || password.length < 6) {
        showFieldError('passwordError', 'Password must be at least 6 characters');
        valid = false;
      }

      if (password !== confirm) {
        showFieldError('confirmError', 'Passwords do not match');
        valid = false;
      }

      if (!valid) {
        e.preventDefault();
        return;
      }

      const btn = document.getElementById('registerBtn');
      btn.textContent = 'Creating account...';
      btn.disabled = true;
    });
  </script>

</body>
</html>
